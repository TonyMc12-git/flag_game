<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Game</title>
  <meta name="theme-color" content="#0f3b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flag Game">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="preconnect" href="https://flagcdn.com">
  <link rel="dns-prefetch" href="https://flagcdn.com">
  <link rel="stylesheet" href="styles.css?v=20260503-flagstrikes1">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel" aria-live="polite">
      <header class="top-bar">
        <div class="title-block">
          <h1>Flag Game</h1>
          <div class="player-stats" aria-label="Points and timer">
            <span><em>Pts</em> <strong id="points-score">0</strong></span>
            <span><em>Time</em> <strong id="round-timer">000.0s</strong></span>
            <span><em>Best</em> <strong id="high-score">0</strong></span>
            <button class="end-game-button" id="end-game-button" type="button">New game</button>
          </div>
        </div>
        <div class="top-actions">
          <button class="fifty-button hidden-placeholder" id="fifty-button" type="button" aria-hidden="true" tabindex="-1"></button>
          <div class="score-card">
            <span class="score-label">Score</span>
            <strong id="score">0 / 0</strong>
            <span class="score-context" id="score-context">of 238 countries / territories</span>
            <button class="mode-button" id="mode-button" type="button">This is too hard &#128557;</button>
          </div>
        </div>
      </header>

      <div class="flag-stage">
        <div class="strike-track" id="strike-track" aria-label="Strikes">
          <span class="strike-pill">1</span>
          <span class="strike-pill">2</span>
          <span class="strike-pill">3</span>
          <span class="strike-pill">4</span>
          <span class="strike-pill">5</span>
        </div>
        <p class="spicy-instruction">Choose all correct answers and click "Confirm"</p>
        <div class="flag-card" id="flag-card" aria-label="Country flag">
          <span class="flag-emoji" id="flag-emoji" aria-hidden="true"></span>
        </div>
      </div>

      <div class="options-grid" id="options-grid" aria-label="Country choices"></div>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-live="assertive" aria-hidden="true">
    <div class="celebration-card">
      <span class="celebration-kicker" id="celebration-kicker"></span>
      <strong class="celebration-title" id="celebration-title"></strong>
      <span class="celebration-copy" id="celebration-copy"></span>
      <button class="celebration-button" id="celebration-button" type="button">OK</button>
    </div>
  </div>

  <div class="bonus-toast" id="bonus-toast" aria-live="assertive" aria-hidden="true"></div>

  <div class="difficulty-menu" id="difficulty-menu" aria-hidden="true">
    <div class="difficulty-menu-card" role="dialog" aria-modal="true" aria-labelledby="difficulty-menu-title">
      <strong class="difficulty-menu-title" id="difficulty-menu-title">Make better choices...</strong>
      <div class="difficulty-menu-options" id="difficulty-menu-options">
        <button class="difficulty-option difficulty-toggle" id="difficulty-toggle" type="button">5 options only</button>
        <button class="difficulty-option" data-country-set="combined" type="button">All Countries/territories (238)</button>
        <button class="difficulty-option" data-country-set="un" type="button">UN countries only (193)</button>
        <button class="difficulty-option" data-country-set="africa" type="button">Africa UN only</button>
        <button class="difficulty-option" data-country-set="europe" type="button">Europe UN only</button>
        <button class="difficulty-option" data-country-set="asia" type="button">Asia UN only</button>
        <button class="difficulty-option" data-country-set="americas" type="button">Americas UN only</button>
        <button class="difficulty-option" data-country-set="australasia" type="button">Australiasia UN only</button>
        <button class="difficulty-option" data-country-set="nonun" type="button">Non-UN only</button>
      </div>
      <button class="difficulty-menu-close" id="difficulty-menu-close" type="button">Back</button>
    </div>
  </div>

  <script src="app.js?v=20260503-flagstrikes1"></script>
</body>
</html>
