<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Game</title>
  <meta name="theme-color" content="#0f3b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flag Game">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css?v=20260418-updates1">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel" aria-live="polite">
      <header class="top-bar">
        <h1>Flag Game</h1>
        <div class="top-actions">
          <button class="fifty-button" id="fifty-button" type="button">50/50</button>
          <div class="score-card">
            <span class="score-label">Score</span>
            <strong id="score">0 / 0</strong>
            <span class="score-context" id="score-context">of 193 UN countries</span>
            <button class="mode-button" id="mode-button" type="button">non UN countries?</button>
            <button class="mode-button spicy-button" id="spicy-button" type="button">Spicy</button>
          </div>
        </div>
      </header>

      <div class="flag-stage">
        <div class="flag-card" id="flag-card" aria-label="Country flag">
          <span class="flag-emoji" id="flag-emoji">🏳️</span>
        </div>
      </div>

      <div class="options-grid" id="options-grid" aria-label="Country choices"></div>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-live="assertive" aria-hidden="true">
    <div class="celebration-card">
      <span class="celebration-kicker" id="celebration-kicker"></span>
      <strong class="celebration-title" id="celebration-title"></strong>
      <span class="celebration-copy" id="celebration-copy"></span>
      <button class="celebration-button" id="celebration-button" type="button">OK</button>
    </div>
  </div>

  <script src="app.js?v=20260418-updates1"></script>
</body>
</html>
